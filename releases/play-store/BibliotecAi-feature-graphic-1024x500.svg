    <text x="2" y="58" fill="#ECFCCB" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">Biblioteca escolar digital</text>
    <text x="2" y="118" fill="#FFFFFF" fill-opacity="0.94" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="500">Leitura, empréstimos, atividades</text>
    <text x="2" y="153" fill="#FFFFFF" fill-opacity="0.94" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="500">e comunicação em um só app.</text>
    <g transform="translate(2 212)">
      <rect width="160" height="48" rx="24" fill="#FFFFFF" fill-opacity="0.18" stroke="#FFFFFF" stroke-opacity="0.28"/>
      <text x="80" y="31" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" text-anchor="middle">Alunos</text>
      <rect x="178" width="178" height="48" rx="24" fill="#FFFFFF" fill-opacity="0.18" stroke="#FFFFFF" stroke-opacity="0.28"/>
      <text x="267" y="31" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" text-anchor="middle">Professores</text>
      <rect x="374" width="162" height="48" rx="24" fill="#FFFFFF" fill-opacity="0.18" stroke="#FFFFFF" stroke-opacity="0.28"/>
      <text x="455" y="31" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" text-anchor="middle">Biblioteca</text>
