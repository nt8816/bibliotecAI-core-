<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="500" viewBox="0 0 1024 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="500" x2="1024" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#063F2A"/>
      <stop offset="0.52" stop-color="#15803D"/>
      <stop offset="1" stop-color="#84CC16"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#032016" flood-opacity="0.32"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  <rect width="1024" height="500" fill="url(#bg)"/>
  <circle cx="895" cy="84" r="176" fill="#FDE68A" opacity="0.16" filter="url(#soft)"/>
  <circle cx="138" cy="434" r="162" fill="#22C55E" opacity="0.22" filter="url(#soft)"/>
  <path d="M0 373C133 318 231 337 350 378C470 420 586 441 714 386C838 333 929 319 1024 350V500H0V373Z" fill="#052E1E" opacity="0.24"/>
  <g transform="translate(70 72)" filter="url(#shadow)">
    <rect width="318" height="318" rx="72" fill="url(#panel)" stroke="#FFFFFF" stroke-opacity="0.28"/>
    <g transform="translate(45 43) scale(0.225)">
      <image href="../../public/app-logo.png" width="1024" height="1024"/>
    </g>
  </g>
  <g transform="translate(438 112)">
